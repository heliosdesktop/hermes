name: Build Hermes Artifacts

on:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      hermes_ref:
        description: Hermes git ref to resolve and build
        default: 250829098.0.0-stable
        required: false
        type: string
      build_type:
        description: CMake build type
        default: Release
        required: false
        type: string

permissions:
  contents: read

env:
  HERMES_REF: ${{ inputs.hermes_ref || '250829098.0.0-stable' }}
  BUILD_TYPE: ${{ inputs.build_type || 'Release' }}

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            os: macos
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            os: linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            os: linux
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            os: windows
            msvc_arch: x64
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            os: windows
            msvc_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Dependencies (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt install build-essential cmake git ninja-build libicu-dev python3 tzdata libreadline-dev

      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $cmakeVersion = "3.30.9"
          $cmakeArch = if ("${{ matrix.msvc_arch }}" -eq "arm64") { "windows-arm64" } else { "windows-x86_64" }
          $cmakeRoot = "$env:RUNNER_TEMP\cmake"
          $archive = "$env:RUNNER_TEMP\cmake.zip"
          $cmakeUrl = "https://github.com/Kitware/CMake/releases/download/v$cmakeVersion/cmake-$cmakeVersion-$cmakeArch.zip"

          Invoke-WebRequest -Uri $cmakeUrl -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $cmakeRoot

          $cmakeBin = Join-Path $cmakeRoot "cmake-$cmakeVersion-$cmakeArch\bin"
          Add-Content -Path $env:GITHUB_PATH -Value $cmakeBin
          & (Join-Path $cmakeBin "cmake.exe") --version

      - name: Checkout Hermes (Unix)
        if: matrix.os == 'macos' || matrix.os == 'linux'
        run: ./scripts/checkout_hermes.sh
        env:
          HERMES_REF: ${{ env.HERMES_REF }}

      - name: Checkout Hermes (Windows)
        if: matrix.os == 'windows'
        run: .\scripts\checkout_hermes.ps1
        env:
          HERMES_REF: ${{ env.HERMES_REF }}

      - name: Build Hermes (Unix)
        if: matrix.os == 'macos' || matrix.os == 'linux'
        run: ./scripts/build_hermes_unix.sh
        env:
          BUILD_TYPE: ${{ env.BUILD_TYPE }}

      - name: Build Hermes (Windows)
        if: matrix.os == 'windows'
        run: .\scripts\build_hermes_windows.ps1
        env:
          BUILD_TYPE: ${{ env.BUILD_TYPE }}
          MSVC_ARCH: ${{ matrix.msvc_arch }}

      - name: Package build artifacts (Unix)
        if: matrix.os == 'macos' || matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          build_type="$(printf '%s' "${BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')"
          hermes_ref="$(printf '%s' "${HERMES_REF}" | tr '/\\:' '---')"
          build_dir="build"
          if [[ "$build_type" == "release" ]]; then
            build_dir="build_release"
          fi

          package_dir="artifact-${TARGET}"
          rm -rf "$package_dir"
          mkdir -p "$package_dir/include" "$package_dir/lib"

          if [[ -d "$build_dir/include" ]]; then
            cmake -E copy_directory "$build_dir/include" "$package_dir/include"
          fi
          if [[ -d "hermes/include" ]]; then
            cmake -E copy_directory "hermes/include" "$package_dir/include"
          fi
          if [[ -d "hermes/public" ]]; then
            cmake -E copy_directory "hermes/public" "$package_dir/include"
          fi
          if [[ -d "hermes/API/jsi/jsi" ]]; then
            mkdir -p "$package_dir/include/jsi"
            cmake -E copy_directory "hermes/API/jsi/jsi" "$package_dir/include/jsi"
          fi
          if [[ -d "hermes/API/hermes" ]]; then
            mkdir -p "$package_dir/include/hermes"
            cmake -E copy_directory "hermes/API/hermes" "$package_dir/include/hermes"
          fi

          find "$build_dir" -type f \( \
            -name '*.a' -o \
            -name '*.dylib' -o \
            -name '*.so' -o \
            -name '*.so.*' \
          \) -exec cp {} "$package_dir/lib/" \;

          test -n "$(find "$package_dir/include" -type f -print -quit)"
          test -n "$(find "$package_dir/lib" -type f -print -quit)"

          zip_name="hermes-${hermes_ref}-${TARGET}-${build_type}.zip"
          cmake -E chdir "$package_dir" cmake -E tar cf "../$zip_name" --format=zip .
          echo "ARTIFACT_NAME=$zip_name" >> "$GITHUB_ENV"
          echo "ARTIFACT_PATH=$zip_name" >> "$GITHUB_ENV"
        env:
          BUILD_TYPE: ${{ env.BUILD_TYPE }}
          HERMES_REF: ${{ env.HERMES_REF }}
          TARGET: ${{ matrix.target }}

      - name: Package build artifacts (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $buildType = $env:BUILD_TYPE.ToLowerInvariant()
          $hermesRef = $env:HERMES_REF -replace '[/\\:]', '-'
          $buildDir = if ($buildType -eq "release") { "build-release" } else { "build" }
          $packageDir = "artifact-$env:TARGET"

          if (Test-Path $packageDir) {
            Remove-Item -Recurse -Force $packageDir
          }
          New-Item -ItemType Directory -Force -Path "$packageDir\include", "$packageDir\lib" | Out-Null

          if (Test-Path "$buildDir\include") {
            cmake -E copy_directory "$buildDir\include" "$packageDir\include"
          }
          if (Test-Path "hermes\include") {
            cmake -E copy_directory "hermes\include" "$packageDir\include"
          }
          if (Test-Path "hermes\public") {
            cmake -E copy_directory "hermes\public" "$packageDir\include"
          }
          if (Test-Path "hermes\API\jsi\jsi") {
            New-Item -ItemType Directory -Force -Path "$packageDir\include\jsi" | Out-Null
            cmake -E copy_directory "hermes\API\jsi\jsi" "$packageDir\include\jsi"
          }
          if (Test-Path "hermes\API\hermes") {
            New-Item -ItemType Directory -Force -Path "$packageDir\include\hermes" | Out-Null
            cmake -E copy_directory "hermes\API\hermes" "$packageDir\include\hermes"
          }

          Get-ChildItem -Path $buildDir -Recurse -File -Include *.lib,*.dll | Copy-Item -Destination "$packageDir\lib" -Force

          if (-not (Get-ChildItem -Path "$packageDir\include" -Recurse -File | Select-Object -First 1)) {
            throw "Packaged artifact contains no headers"
          }
          if (-not (Get-ChildItem -Path "$packageDir\lib" -Recurse -File | Select-Object -First 1)) {
            throw "Packaged artifact contains no libraries"
          }

          $zipName = "hermes-$hermesRef-$env:TARGET-$buildType.zip"
          cmake -E chdir $packageDir cmake -E tar cf "..\$zipName" --format=zip .
          "ARTIFACT_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ARTIFACT_PATH=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
        env:
          BUILD_TYPE: ${{ env.BUILD_TYPE }}
          HERMES_REF: ${{ env.HERMES_REF }}
          TARGET: ${{ matrix.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
