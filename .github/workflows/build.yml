name: Build Hermes Artifacts

on:
  workflow_dispatch:
    inputs:
      hermes_ref:
        description: Hermes git ref to resolve and build
        default: 250829098.0.0-stable
        required: true
      build_type:
        description: CMake build type
        default: Release
        required: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            os: macos
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            os: linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            os: linux
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            os: windows
            msvc_arch: x64
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            os: windows
            msvc_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos'
        run: brew install cmake ninja

      - name: Install Dependencies (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt install build-essential cmake git ninja-build libicu-dev python3 tzdata libreadline-dev

      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $cmakeVersion = "3.30.9"
          $cmakeArch = if ("${{ matrix.msvc_arch }}" -eq "arm64") { "windows-arm64" } else { "windows-x86_64" }
          $cmakeRoot = "$env:RUNNER_TEMP\cmake"
          $archive = "$env:RUNNER_TEMP\cmake.zip"
          $cmakeUrl = "https://github.com/Kitware/CMake/releases/download/v$cmakeVersion/cmake-$cmakeVersion-$cmakeArch.zip"

          Invoke-WebRequest -Uri $cmakeUrl -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $cmakeRoot

          $cmakeBin = Join-Path $cmakeRoot "cmake-$cmakeVersion-$cmakeArch\bin"
          Add-Content -Path $env:GITHUB_PATH -Value $cmakeBin
          & (Join-Path $cmakeBin "cmake.exe") --version

      - name: Checkout Hermes (Unix)
        if: matrix.os == 'macos' || matrix.os == 'linux'
        run: ./scripts/checkout_hermes.sh
        env:
          HERMES_REF: ${{ github.event.inputs.hermes_ref }}

      - name: Checkout Hermes (Windows)
        if: matrix.os == 'windows'
        run: .\scripts\checkout_hermes.ps1
        env:
          HERMES_REF: ${{ github.event.inputs.hermes_ref }}

      - name: Build Hermes (Unix)
        if: matrix.os == 'macos' || matrix.os == 'linux'
        run: ./scripts/build_hermes_unix.sh
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type }}

      - name: Build Hermes (Windows)
        if: matrix.os == 'windows'
        run: .\scripts\build_hermes_windows.ps1
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type }}
          MSVC_ARCH: ${{ matrix.msvc_arch }}
